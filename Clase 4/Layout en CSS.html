<!-- Se te presenta un esquema de la estructura de una página web, identificada por un contenedor principal 
(#contenedor) que incluye una cabecera (#cabecera), 
un menú de navegación (#menu), un área de contenido principal (#contenido), y un pie de página (#pie). 
Tal como se muestra en la imagen adjunta, el menú actualmente se encuentra a la izquierda del contenido.
Tu tarea consiste en escribir el código HTML necesario para representar esta estructura y el código CSS 
para aplicar los estilos solicitados en las siguientes modificaciones. Para cada modificación, 
proporciona el fragmento de código HTML (si es necesario modificarlo) y el código CSS correspondiente. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="Layout en CSS.css" rel="stylesheet" type="text/css">
</head>
<body class="Contenedor">
    <header class="Cabecera">
        <h1>#cabecera</h1>
    </header>
    <nav class="Menu">
        <h2>#menu</h2>
    </nav>
    <main class="Contenido">
        <h2>#contenido</h2>
    </main>
    <footer class="Pie">
        <h2>#pie</h2>
    </footer>
</body>
</html>
